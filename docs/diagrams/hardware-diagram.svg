<text x="650.0" y="560" text-anchor="middle" font-size="10.2" fill="#94a3b8" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">debounce -&gt; relay update -&gt; emit JSON every 2s + on change</text>
<rect x="480" y="598" width="340" height="76" rx="8" fill="#334155" stroke="#475569"/>
