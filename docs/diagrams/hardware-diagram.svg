<text x="650.0" y="448" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Analog Input (ADC1_CH6)</text>
<text x="650.0" y="470" text-anchor="middle" font-size="10.2" fill="#94a3b8" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">GPIO 34 — current-sense tap, no pull-up</text>
