<text x="650.0" y="712" text-anchor="middle" font-size="11.2" font-weight="700" fill="#e2e8f0">Board power: 5V (VIN) · 3V3 (logic) · GND common</text>
<text x="650.0" y="730" text-anchor="middle" font-size="9.8" fill="#94a3b8">5V rail also feeds the relay board coil supply</text>
