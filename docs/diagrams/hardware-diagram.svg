<rect x="0" y="0" width="1780" height="966" fill="#ffffff"/>
<text x="40" y="44" font-size="27" font-weight="700" fill="#1e293b">Techathon2026-Straw_Hat — Hardware Architecture (Work Room 1 node)</text>
<text x="40" y="68" font-size="14" fill="#64748b">One ESP32 per room reads wall switches, drives isolated relays, and senses real current — emitting the same JSON the software simulator already produces.</text>
<line x1="40" y1="84" x2="1740" y2="84" stroke="#e2e8f0" stroke-width="1.5"/>
<g filter="url(#soft-shadow)"><rect x="40" y="98" width="1700" height="60" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.3"/></g>
<text x="60" y="121" font-size="12.3" font-weight="700" fill="#6d28d9">CONNECTS TO THE SOFTWARE SYSTEM</text>
<text x="60" y="142" font-size="11.6" fill="#5b21b6">This node’s WiFi uplink POSTs the same <tspan font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">{room, devices[], roomWatts}</tspan> JSON shape the software simulator emits, to the identical backend ingestion route (see system-diagram.svg) — no backend changes needed to accept a real room.</text>
